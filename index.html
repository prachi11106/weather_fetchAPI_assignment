<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ===== CSS VARIABLES — single source of truth for both themes ===== */
        :root {
            /* Light mode */
            --bg-gradient-start: #e47aaf;
            --bg-gradient-end:   #854aa1;

            --card-bg:           #ffffff;
            --card-text:         #140439;
            --card-subtext:      #444;

            --input-bg:          #ffffff;
            --input-text:        #140439;
            --input-border:      #BBE0EF;

            --btn-bg:            #F16D34;
            --btn-text:          #ffffff;

            --history-btn-bg:    #F16D34;
            --history-btn-text:  #ffffff;

            --item-bg:           #f4f4f4;
            --item-border:       #F16D34;
            --item-label:        #555;
            --item-value:        #111;

            --toggle-bg:         rgba(255,255,255,0.25);
            --toggle-text:       #140439;
            --toggle-border:     rgba(255,255,255,0.5);

            --console-bg:        #161E54;
            --console-text:      #BBE0EF;

            --transition:        0.35s ease;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #1a1a3e;
            --bg-gradient-end:   #2c1654;

            --card-bg:           #1e1e3a;
            --card-text:         #e8e8ff;
            --card-subtext:      #aaa8cc;

            --input-bg:          #2a2a4a;
            --input-text:        #e8e8ff;
            --input-border:      #4a4a7a;

            --btn-bg:            #7c3aed;
            --btn-text:          #ffffff;

            --history-btn-bg:    #4a2a7a;
            --history-btn-text:  #e0d0ff;

            --item-bg:           #2a2a50;
            --item-border:       #7c3aed;
            --item-label:        #a89cc8;
            --item-value:        #e8e8ff;

            --toggle-bg:         rgba(255,255,255,0.1);
            --toggle-text:       #e8e8ff;
            --toggle-border:     rgba(255,255,255,0.2);

            --console-bg:        #12122a;
            --console-text:      #a89cc8;
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 20px;
            transition:
                background var(--transition),
                color var(--transition);
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 20px;
            font-style: italic;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* ===== TOGGLE BUTTON ===== */
        #modeToggle {
            background: var(--toggle-bg);
            color: var(--toggle-text);
            border: 1px solid var(--toggle-border);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition:
                background var(--transition),
                color var(--transition),
                border-color var(--transition);
        }

        #modeToggle:hover {
            background: rgba(255,255,255,0.35);
        }

        /* ===== CARDS ===== */
        .parent-card {
            display: flex;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            color: var(--card-text);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            transition:
                background var(--transition),
                color var(--transition),
                box-shadow var(--transition);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .card h3 {
            margin-bottom: 12px;
            color: var(--card-text);
            transition: color var(--transition);
        }

        /* ===== INPUT & SEARCH BUTTON ===== */
        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-text);
            outline: none;
            transition:
                background var(--transition),
                color var(--transition),
                border-color var(--transition);
        }

        input::placeholder {
            color: var(--item-label);
        }

        input:focus {
            border-color: var(--btn-bg);
        }

        button {
            padding: 10px 20px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition:
                background var(--transition),
                color var(--transition),
                transform 0.1s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.97);
        }

        /* ===== WEATHER RESULT ITEMS ===== */
        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            border-left: 4px solid var(--item-border);
            margin-bottom: 8px;
            background: var(--item-bg);
            border-radius: 0 6px 6px 0;
            transition:
                background var(--transition),
                border-color var(--transition);
        }

        .weather-item label {
            color: var(--item-label);
            font-size: 0.9rem;
            transition: color var(--transition);
        }

        .weather-item span {
            color: var(--item-value);
            font-weight: 600;
            transition: color var(--transition);
        }

        /* ===== HISTORY BUTTONS ===== */
        .history button {
            margin: 5px 5px 5px 0;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--history-btn-bg);
            color: var(--history-btn-text);
            font-size: 0.85rem;
            transition:
                background var(--transition),
                color var(--transition);
        }

        .history .clear-btn {
            background: transparent;
            border: 1px solid var(--item-border);
            color: var(--item-label);
        }

        .history .clear-btn:hover {
            background: var(--item-bg);
        }

        .no-history {
            color: var(--card-subtext);
            font-size: 0.9rem;
        }

        /* ===== CONSOLE ===== */
        .console {
            background: var(--console-bg);
            color: var(--console-text);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
            transition:
                background var(--transition),
                color var(--transition);
        }

        /* ===== MAP CARD ===== */
        #mapCard {
            display: none;
        }

        #mapCard.visible {
            display: block;
        }

        #mapFrame {
            width: 100%;
            height: 380px;
            border: none;
            border-radius: 8px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>Async Weather Tracker</h1>

        <div style="text-align:center; margin-bottom:15px;">
            <button id="modeToggle">🌙 Dark Mode</button>
        </div>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <div class="card" id="mapCard">
            <h3 id="mapTitle">📍 Map</h3>
            <br>
            <iframe id="mapFrame" allowfullscreen></iframe>
        </div>

    </div>

    <script>
        const API_KEY = "de6620cb1fd0035d2d02a73b23fbe931";

        const weatherBox  = document.getElementById("weather");
        const historyBox  = document.getElementById("history");
        const cityInput   = document.getElementById("cityInput");
        const toggleBtn   = document.getElementById("modeToggle");
        const htmlEl      = document.documentElement;

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("City not found");
                throw new Error("City not found");
            }
            return res.json();
        }

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
            `;
            renderMap(d.coord.lat, d.coord.lon, d.name, d.sys.country);
        }

        /* ---------- MAP RENDER ---------- */
        // Uses coord.lat & coord.lon already returned by the weather API — no extra fetch needed
        function renderMap(lat, lon, city, country) {
            const mapCard  = document.getElementById("mapCard");
            const mapFrame = document.getElementById("mapFrame");
            const mapTitle = document.getElementById("mapTitle");

            const offset = 0.3;
            mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${lon - offset}%2C${lat - offset}%2C${lon + offset}%2C${lat + offset}&layer=mapnik&marker=${lat}%2C${lon}`;

            mapTitle.textContent = `📍 ${city}, ${country}`;
            mapCard.classList.add("visible");
        }

        /* ---------- HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            if (!history.includes(city)) {
                history.unshift(city);
                if (history.length > 8) history.pop();
                localStorage.setItem("weatherHistory", JSON.stringify(history));
            }
            showHistory();
        }

        function showHistory() {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            historyBox.innerHTML = "";

            if (history.length === 0) {
                historyBox.innerHTML = `<p class="no-history">No search history yet.</p>`;
                return;
            }

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;
                btn.onclick = () => { cityInput.value = city; search(city); };
                historyBox.appendChild(btn);
            });

            const clearBtn = document.createElement("button");
            clearBtn.textContent = "🗑 Clear";
            clearBtn.classList.add("clear-btn");
            clearBtn.onclick = () => { localStorage.removeItem("weatherHistory"); showHistory(); };
            historyBox.appendChild(clearBtn);
        }

        /* ---------- SEARCH ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        /* ---------- DARK MODE (clean CSS-variable approach) ---------- */
        function applyTheme(theme) {
            htmlEl.setAttribute("data-theme", theme);
            toggleBtn.textContent = theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
            localStorage.setItem("mode", theme);
        }

        toggleBtn.onclick = () => {
            const current = htmlEl.getAttribute("data-theme");
            applyTheme(current === "dark" ? "light" : "dark");
        };

        // Load saved preference on startup
        applyTheme(localStorage.getItem("mode") === "dark" ? "dark" : "light");

        /* ---------- INIT ---------- */
        showHistory();
    </script>
</body>

</html>
